name: CI-PR

on:
  pull_request:
    types: [ opened, synchronize, reopened ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - macos-15
          - macos-15-intel
          - ubuntu-22.04
          - ubuntu-22.04-arm
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - windows-2022
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup MINGW64
        if: startsWith(matrix.platform, 'windows')
        uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          install: >-
            mingw-w64-x86_64-gcc
      - name: Setup go compiler
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Setup zig
        if: matrix.platform == 'ubuntu-22.04'
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.11.0
      - name: Test
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "ubuntu-24.04" ]]; then
            ENABLE_DOCKER_TESTS=true go run mage.go test
          else
            go run mage.go test
          fi
      - name: Codecov
        if: matrix.platform == 'ubuntu-24.04'
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Test arm32
        if: matrix.platform == 'ubuntu-22.04'
        run: go run mage.go buildx machbase-neo linux arm
